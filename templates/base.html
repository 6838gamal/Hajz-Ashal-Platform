<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}منصة المواعيد{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>body { font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif; }</style>
  {% block head %}{% endblock %}
</head>
<body class="page">

  <nav class="navbar">
    <a href="/" class="brand">
      <div class="logo-icon">🏥</div>
      <span>منصة المواعيد</span>
    </a>
    <nav id="nav-links">
      <a href="/login">تسجيل الدخول</a>
      <a href="/register/business" class="btn btn-primary" style="padding:.4rem 1rem;font-size:.88rem;">ابدأ مجاناً</a>
    </nav>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer style="text-align:center;padding:1.5rem;color:var(--text-muted);font-size:.85rem;border-top:1px solid var(--border);margin-top:auto;">
    جميع الحقوق محفوظة &copy; 2025 — منصة المواعيد
  </footer>

  <script src="/static/js/api.js"></script>
  {% block scripts %}{% endblock %}
  <script>
    // Update navbar based on login state
    if (Auth.isLoggedIn()) {
      const info = Auth.getUserInfo();
      document.getElementById('nav-links').innerHTML = `
        <a href="/dashboard">لوحة التحكم</a>
        <a href="#" onclick="Auth.clear();location.href='/';return false;" style="color:var(--danger)">تسجيل الخروج</a>
      `;
    }
  </script>
</body>
</html>
